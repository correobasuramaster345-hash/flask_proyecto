<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login — Sistema</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
            width: 360px;
        }
        h2 { text-align: center; margin-bottom: 24px; color: #1976d2; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; color: #444; }
        input {
            width: 100%; padding: 10px 12px;
            border: 1px solid #ccc; border-radius: 8px; font-size: 14px;
        }
        button {
            width: 100%; padding: 12px; background: #1976d2;
            color: white; border: none; border-radius: 8px;
            font-size: 16px; cursor: pointer; margin-top: 8px;
        }
        button:hover { background: #125ea7; }
        .error { color: red; text-align: center; margin-top: 12px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🔐 Iniciar Sesión</h2>
        <form method="POST" action="/login">
            <div class="form-group">
                <label>Usuario</label>
                <input type="text" name="username" placeholder="Ingrese su usuario" required>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" name="password" placeholder="Ingrese su contraseña" required>
            </div>
            <button type="submit">Entrar</button>
        </form>
        {% if error %}
        <p class="error">⚠️ {{ error }}</p>
        {% endif %}
    </div>
</body>
</html>
