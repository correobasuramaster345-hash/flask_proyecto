<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Principal</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f4f6f9; }
        .navbar {
            background: #1976d2; color: white;
            padding: 16px 30px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .navbar h1 { font-size: 20px; }
        .navbar a {
            color: white; text-decoration: none;
            background: #d32f2f; padding: 8px 16px;
            border-radius: 6px; font-size: 14px;
        }
        .navbar a:hover { background: #b71c1c; }
        .contenido {
            max-width: 700px; margin: 60px auto;
            background: white; padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.10);
            text-align: center;
        }
        .contenido h2 { color: #1976d2; margin-bottom: 12px; font-size: 26px; }
        .contenido p { color: #555; margin-bottom: 32px; font-size: 16px; }
        .btn-buscador {
            display: inline-block;
            padding: 14px 36px;
            background: #1976d2; color: white;
            border-radius: 8px; text-decoration: none;
            font-size: 18px;
        }
        .btn-buscador:hover { background: #125ea7; }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>🏠 Panel Principal</h1>
        <a href="/logout">🚪 Salir del sistema</a>
    </div>
    <div class="contenido">
        <h2>Bienvenido, {{ nombre }} 👋</h2>
        <p>Has ingresado correctamente al sistema. Selecciona una opción para continuar.</p>
        <a href="/buscador" class="btn-buscador">🔍 Ir al Buscador de Productos</a>
    </div>
</body>
</html>
